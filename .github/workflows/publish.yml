name: Auto Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    # 🚫 Prevent workflow from running on version bump commits
    if: "!contains(github.event.head_commit.message, 'ci: bump version')"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - run: npm install

      - run: npm test || echo "No tests found"

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      # ✅ Always bump BEFORE publish
      - name: Bump version
        run: npm version patch -m "ci: bump version to %s"

      - name: Push version
        run: git push origin main --follow-tags

      # ✅ Publish AFTER correct version
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}